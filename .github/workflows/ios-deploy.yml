name: iOS Deploy

on:
  release:
    types: [published]

permissions:
  contents: read
  actions: read

jobs:
  ios-deploy:
    name: Deploy to App Store
    runs-on: macos-15
    environment: production
    timeout-minutes: 60

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Verify CI passed
        uses: ./.github/actions/verify-ci
        with:
          set-deploy-sha: 'true'

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter

      - name: Setup iOS
        uses: ./.github/actions/setup-ios

      - name: Verify required secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_DEPLOY_KEY: ${{ secrets.MATCH_DEPLOY_KEY }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          MISSING=()
          [ -z "$GEMINI_API_KEY" ] && MISSING+=("GEMINI_API_KEY")
          [ -z "$MATCH_PASSWORD" ] && MISSING+=("MATCH_PASSWORD")
          [ -z "$MATCH_DEPLOY_KEY" ] && MISSING+=("MATCH_DEPLOY_KEY")
          [ -z "$IOS_TEAM_ID" ] && MISSING+=("IOS_TEAM_ID")
          [ -z "$APP_STORE_CONNECT_API_KEY_ID" ] && MISSING+=("APP_STORE_CONNECT_API_KEY_ID")
          [ -z "$APP_STORE_CONNECT_ISSUER_ID" ] && MISSING+=("APP_STORE_CONNECT_ISSUER_ID")
          [ -z "$APP_STORE_CONNECT_API_KEY" ] && MISSING+=("APP_STORE_CONNECT_API_KEY")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            exit 1
          fi
          echo "All required secrets verified"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - name: Setup SSH for match
        env:
          MATCH_DEPLOY_KEY: ${{ secrets.MATCH_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$MATCH_DEPLOY_KEY" > ~/.ssh/match_deploy_key
          chmod 600 ~/.ssh/match_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          printf 'Host github.com\n  IdentityFile ~/.ssh/match_deploy_key\n  IdentitiesOnly yes\n' >> ~/.ssh/config

      - name: Sync iOS signing assets (fastlane match)
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          cd ios
          bundle exec fastlane sync_signing

          echo "=== Installed certificates ==="
          security find-identity -v -p codesigning
          echo "=== Installed provisioning profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || true

      - name: Create ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          cat > ios/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>uploadBitcode</key>
              <false/>
              <key>compileBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.focuswave.dev.smartPhotoDiary</key>
                  <string>match AppStore com.focuswave.dev.smartPhotoDiary</string>
              </dict>
          </dict>
          </plist>
          EOF

      - name: Create dart-defines file
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo '{}' | jq --arg key "$GEMINI_API_KEY" '.GEMINI_API_KEY = $key' > dart_defines.json

      - name: Build iOS IPA
        env:
          DEPLOY_TAG: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION_NAME="${DEPLOY_TAG#v}"
          BUILD_NUMBER=$(gh run list --workflow release.yml --commit "$DEPLOY_SHA" --status completed --json runNumber --jq '.[0].runNumber // empty' 2>/dev/null || true)
          if [ -z "$BUILD_NUMBER" ]; then
            echo "::warning::Could not retrieve release build number, using current run number"
            BUILD_NUMBER=$GITHUB_RUN_NUMBER
          fi

          echo "Deploying version: $VERSION_NAME from tag $DEPLOY_TAG (build #$BUILD_NUMBER)"

          flutter build ipa --release \
            --build-name=$VERSION_NAME \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define-from-file=dart_defines.json

          echo "=== Generated IPA files ==="
          ls -la build/ios/ipa/

      - name: Cleanup dart-defines file
        if: always()
        run: rm -f dart_defines.json

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          echo "Uploading to TestFlight via fastlane..."

          IPA_PATH=$(find "$PWD/build/ios/ipa" -name "*.ipa" -print -quit)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA file found in build/ios/ipa/"
            exit 1
          fi
          echo "Found IPA file: $IPA_PATH"
          export IPA_PATH

          cd ios
          bundle exec fastlane upload_testflight

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f ios/ExportOptions.plist

      - name: Create release summary
        env:
          DEPLOY_TAG: ${{ github.event.release.tag_name }}
        run: |
          echo "## iOS Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: $DEPLOY_TAG" >> $GITHUB_STEP_SUMMARY
          echo "- **Bundle ID**: com.focuswave.dev.smartPhotoDiary" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: TestFlight" >> $GITHUB_STEP_SUMMARY
          echo "- **Build**: ${{ env.DEPLOY_SHA }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Check TestFlight for build processing status" >> $GITHUB_STEP_SUMMARY
          echo "2. For beta testing: Add beta testers and collect feedback" >> $GITHUB_STEP_SUMMARY
          echo "3. For App Store release: Manually submit from App Store Connect" >> $GITHUB_STEP_SUMMARY
