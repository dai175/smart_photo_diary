name: iOS Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to deploy (e.g., v1.1.0)'
        required: true
        type: string

permissions:
  contents: read
  actions: read

env:
  FLUTTER_VERSION: '3.41.4'

jobs:
  ios-deploy:
    name: Deploy to App Store
    runs-on: macos-15
    environment: production
    timeout-minutes: 60

    steps:
      - name: Checkout specific tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Verify CI passed for tag
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_TAG: ${{ github.event.inputs.tag }}
        run: |
          echo "Checking CI status for tag: $DEPLOY_TAG"
          if ! git tag --points-at HEAD | grep -Fxq "$DEPLOY_TAG"; then
            echo "::error::Tag $DEPLOY_TAG does not point to the checked-out commit"
            exit 1
          fi
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "DEPLOY_SHA=$COMMIT_SHA" >> $GITHUB_ENV
          CI_STATUS=$(gh run list --commit "$COMMIT_SHA" --workflow ci.yml --event push --branch main --status completed --json conclusion --jq '.[0].conclusion // "not_found"' 2>/dev/null || echo "not_found")
          if [ "$CI_STATUS" != "success" ]; then
            echo "::error::CI has not passed for this tag (status: ${CI_STATUS}). Please ensure CI passes before deploying."
            exit 1
          fi
          echo "CI passed for tag $DEPLOY_TAG (commit: $COMMIT_SHA)"

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Setup iOS
        uses: ./.github/actions/setup-ios

      - name: Verify required secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IOS_DISTRIBUTION_CERTIFICATE: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          MISSING=()
          [ -z "$GEMINI_API_KEY" ] && MISSING+=("GEMINI_API_KEY")
          [ -z "$IOS_DISTRIBUTION_CERTIFICATE" ] && MISSING+=("IOS_DISTRIBUTION_CERTIFICATE")
          [ -z "$IOS_CERTIFICATE_PASSWORD" ] && MISSING+=("IOS_CERTIFICATE_PASSWORD")
          [ -z "$IOS_PROVISIONING_PROFILE" ] && MISSING+=("IOS_PROVISIONING_PROFILE")
          [ -z "$IOS_KEYCHAIN_PASSWORD" ] && MISSING+=("IOS_KEYCHAIN_PASSWORD")
          [ -z "$IOS_TEAM_ID" ] && MISSING+=("IOS_TEAM_ID")
          [ -z "$APP_STORE_CONNECT_API_KEY_ID" ] && MISSING+=("APP_STORE_CONNECT_API_KEY_ID")
          [ -z "$APP_STORE_CONNECT_ISSUER_ID" ] && MISSING+=("APP_STORE_CONNECT_ISSUER_ID")
          [ -z "$APP_STORE_CONNECT_API_KEY" ] && MISSING+=("APP_STORE_CONNECT_API_KEY")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            exit 1
          fi
          echo "All required secrets verified"

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

          echo "=== Installed certificates ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          echo "=== Installed provisioning profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "=== Xcode project signing settings ==="
          grep -n "CODE_SIGN_STYLE\|PROVISIONING_PROFILE_SPECIFIER" ios/Runner.xcodeproj/project.pbxproj || true

      - name: Create ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          cat > ios/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>uploadBitcode</key>
              <false/>
              <key>compileBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.focuswave.dev.smartPhotoDiary</key>
                  <string>Smart Photo Diary App Store</string>
              </dict>
          </dict>
          </plist>
          EOF

      - name: Create dart-defines file
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo '{}' | jq --arg key "$GEMINI_API_KEY" '.GEMINI_API_KEY = $key' > dart_defines.json

      - name: Build iOS IPA
        env:
          DEPLOY_TAG: ${{ github.event.inputs.tag }}
        run: |
          VERSION_NAME="$DEPLOY_TAG"
          VERSION_NAME=${VERSION_NAME#v}
          echo "Deploying version: $VERSION_NAME from tag $DEPLOY_TAG"

          BUILD_NUMBER=$GITHUB_RUN_NUMBER
          echo "Build number: $BUILD_NUMBER (run #$GITHUB_RUN_NUMBER)"

          flutter build ipa --release \
            --build-name=$VERSION_NAME \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define-from-file=dart_defines.json

          echo "=== Generated IPA files ==="
          ls -la build/ios/ipa/

      - name: Cleanup dart-defines file
        if: always()
        run: rm -f dart_defines.json

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          echo "Uploading to TestFlight via fastlane..."

          IPA_PATH=$(find "$PWD/build/ios/ipa" -name "*.ipa" -print -quit)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA file found in build/ios/ipa/"
            exit 1
          fi
          echo "Found IPA file: $IPA_PATH"
          export IPA_PATH

          cd ios
          bundle exec fastlane upload_testflight

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f ios/ExportOptions.plist
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

      - name: Create release summary
        env:
          DEPLOY_TAG: ${{ github.event.inputs.tag }}
        run: |
          echo "## iOS Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: $DEPLOY_TAG" >> $GITHUB_STEP_SUMMARY
          echo "- **Bundle ID**: com.focuswave.dev.smartPhotoDiary" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: TestFlight" >> $GITHUB_STEP_SUMMARY
          echo "- **Build**: ${{ env.DEPLOY_SHA }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Check TestFlight for build processing status" >> $GITHUB_STEP_SUMMARY
          echo "2. For beta testing: Add beta testers and collect feedback" >> $GITHUB_STEP_SUMMARY
          echo "3. For App Store release: Manually submit from App Store Connect" >> $GITHUB_STEP_SUMMARY
