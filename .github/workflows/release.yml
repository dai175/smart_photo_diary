name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

env:
  FLUTTER_VERSION: '3.41.4'

permissions:
  contents: write
  pull-requests: read

jobs:
  version:
    name: Extract Version Info
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_name: ${{ steps.version.outputs.version_name }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Extract version info
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            VERSION_NAME="${VERSION#v}"
            echo "Release build - Tag: ${VERSION}, Version: ${VERSION_NAME}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
            if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::Invalid version format: ${VERSION}. Expected: v1.2.3 or v1.2.3-beta.1"
              exit 1
            fi
            VERSION_NAME="${VERSION#v}"
            echo "Manual build - Version: ${VERSION_NAME}"
          else
            VERSION="v1.0.0-dev"
            VERSION_NAME="1.0.0-dev"
            echo "Development build - Version: ${VERSION_NAME}"
          fi

          BUILD_NUMBER=$GITHUB_RUN_NUMBER
          echo "Build number: ${BUILD_NUMBER} (run #${GITHUB_RUN_NUMBER})"

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT

  build-ios-release:
    name: Build iOS Release Artifacts
    needs: [version]
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Verify Xcode and install iOS platform if needed
        run: |
          echo "Xcode version:"
          xcodebuild -version
          echo "Available platforms:"
          xcrun simctl list runtimes
          echo "Installing iOS platform if missing..."
          xcodebuild -downloadPlatform iOS || echo "Platform already available or download failed"

      - name: Verify required secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY secret is not set"
            exit 1
          fi
          echo "Required secrets verified"

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Create dart-defines file
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo '{}' | jq --arg key "$GEMINI_API_KEY" '.GEMINI_API_KEY = $key' > dart_defines.json

      - name: Build iOS (release, no codesign)
        run: |
          echo "Building iOS version: ${{ needs.version.outputs.version_name }} (Build ${{ needs.version.outputs.build_number }})"
          flutter build ios --release --no-codesign \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }} \
            --dart-define-from-file=dart_defines.json

      - name: Cleanup dart-defines file
        if: always()
        run: rm -f dart_defines.json

      - name: Prepare iOS artifacts
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mkdir -p ios-artifacts

          (
            cd build/ios/iphoneos
            zip -r ../../../ios-artifacts/smart-photo-diary-ios-${VERSION}.zip Runner.app
          )

          (
            cd ios-artifacts
            shasum -a 256 smart-photo-diary-ios-*.zip > smart-photo-diary-checksums.txt
          )

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ios-release-artifacts
          path: ios-artifacts/*
          retention-days: 90

  create-release:
    name: Create GitHub Release
    needs: [version, build-ios-release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download iOS artifacts
        uses: actions/download-artifact@v7
        with:
          name: ios-release-artifacts
          path: ./artifacts/ios

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: "Smart Photo Diary ${{ needs.version.outputs.version }}"
          draft: true
          prerelease: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == 'true') || (github.event_name == 'push' && contains(needs.version.outputs.version, '-')) }}
          files: |
            artifacts/ios/smart-photo-diary-ios-*.zip
            artifacts/ios/smart-photo-diary-checksums.txt
          body: |
            Build artifacts for Smart Photo Diary ${{ needs.version.outputs.version }}

            **Build Info:** ${{ needs.version.outputs.version_name }} (Build ${{ needs.version.outputs.build_number }})
            **Commit:** ${{ github.sha }}

            Release notes will be updated manually.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release summary
        env:
          VERSION: ${{ needs.version.outputs.version }}
          IS_PRERELEASE: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == 'true') || (github.event_name == 'push' && contains(needs.version.outputs.version, '-')) }}
        run: |
          echo "## Release Created Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Pre-release**: $IS_PRERELEASE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Assets" >> $GITHUB_STEP_SUMMARY
          echo "- iOS Build Archive" >> $GITHUB_STEP_SUMMARY
          echo "- SHA256 Checksums" >> $GITHUB_STEP_SUMMARY
