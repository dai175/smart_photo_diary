name: Create Release

on:
  push:
    tags:
      - 'v*'

env:
  FLUTTER_VERSION: '3.41.4'

permissions:
  contents: write
  pull-requests: read

jobs:
  version:
    name: Extract Version Info
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_name: ${{ steps.version.outputs.version_name }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Verify CI passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          CI_STATUS=$(gh run list --commit "$COMMIT_SHA" --workflow ci.yml --event push --branch main --status completed --json conclusion --jq '.[0].conclusion // "not_found"' 2>/dev/null || echo "not_found")
          if [ "$CI_STATUS" != "success" ]; then
            echo "::error::CI has not passed for this commit (status: ${CI_STATUS}). Please ensure CI passes before releasing."
            exit 1
          fi
          echo "CI passed for commit $COMMIT_SHA"

      - name: Extract version info
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION_NAME="${VERSION#v}"
          BUILD_NUMBER=$GITHUB_RUN_NUMBER

          echo "Release build - Tag: ${VERSION}, Version: ${VERSION_NAME}, Build: ${BUILD_NUMBER}"

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT

  build-ios-release:
    name: Build iOS Release Artifacts
    needs: [version]
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Setup iOS
        uses: ./.github/actions/setup-ios

      - name: Verify required secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY secret is not set"
            exit 1
          fi
          echo "Required secrets verified"

      - name: Create dart-defines file
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo '{}' | jq --arg key "$GEMINI_API_KEY" '.GEMINI_API_KEY = $key' > dart_defines.json

      - name: Build iOS (release, no codesign)
        run: |
          echo "Building iOS version: ${{ needs.version.outputs.version_name }} (Build ${{ needs.version.outputs.build_number }})"
          flutter build ios --release --no-codesign \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }} \
            --dart-define-from-file=dart_defines.json

      - name: Cleanup dart-defines file
        if: always()
        run: rm -f dart_defines.json

      - name: Prepare iOS artifacts
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mkdir -p ios-artifacts

          (
            cd build/ios/iphoneos
            zip -r ../../../ios-artifacts/smart-photo-diary-ios-${VERSION}.zip Runner.app
          )

          (
            cd ios-artifacts
            shasum -a 256 smart-photo-diary-ios-*.zip > smart-photo-diary-checksums.txt
          )

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-artifacts
          path: ios-artifacts/*
          retention-days: 90

  create-release:
    name: Create GitHub Release
    needs: [version, build-ios-release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download iOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-release-artifacts
          path: ./artifacts/ios

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: "Smart Photo Diary ${{ needs.version.outputs.version }}"
          draft: true
          prerelease: ${{ contains(needs.version.outputs.version, '-') }}
          files: |
            artifacts/ios/smart-photo-diary-ios-*.zip
            artifacts/ios/smart-photo-diary-checksums.txt
          body: |
            Build artifacts for Smart Photo Diary ${{ needs.version.outputs.version }}

            **Build Info:** ${{ needs.version.outputs.version_name }} (Build ${{ needs.version.outputs.build_number }})
            **Commit:** ${{ github.sha }}

            Release notes will be updated manually.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release summary
        env:
          VERSION: ${{ needs.version.outputs.version }}
          IS_PRERELEASE: ${{ contains(needs.version.outputs.version, '-') }}
        run: |
          echo "## Release Created Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Pre-release**: $IS_PRERELEASE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Assets" >> $GITHUB_STEP_SUMMARY
          echo "- iOS Build Archive" >> $GITHUB_STEP_SUMMARY
          echo "- SHA256 Checksums" >> $GITHUB_STEP_SUMMARY
