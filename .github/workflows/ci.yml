name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality-check:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          setup-java: 'true'

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --fatal-warnings --fatal-infos

      - name: Run tests
        run: flutter test --coverage --reporter=expanded

      - name: Remove generated and UI files from coverage
        run: |
          if ! command -v lcov &>/dev/null; then sudo apt-get install -y lcov; fi
          lcov --remove coverage/lcov.info \
            '**/*.g.dart' \
            '**/l10n/generated/*' \
            '**/debug/*' \
            '**/screens/**' \
            '**/widgets/**' \
            '**/ui/**' \
            '**/shared/**' \
            '**/main.dart' \
            --ignore-errors unused \
            -o coverage/lcov.info

      - name: Check coverage threshold
        run: |
          COVERAGE_LINE=$(lcov --summary coverage/lcov.info 2>&1 | grep 'lines' || true)
          COVERAGE_NUM=$(echo "$COVERAGE_LINE" | sed -n 's/.*:\s*\([0-9.]*\)%.*/\1/p' | head -1)
          COVERAGE="${COVERAGE_NUM}%"
          MIN_COVERAGE=55
          echo "Coverage: ${COVERAGE:-Unknown}"
          if [ -z "$COVERAGE_NUM" ]; then
            echo "::error::Could not parse coverage percentage"
            exit 1
          fi
          if ! awk "BEGIN { exit ($COVERAGE_NUM >= $MIN_COVERAGE ? 0 : 1) }"; then
            echo "::error::Coverage ${COVERAGE} is below threshold ${MIN_COVERAGE}%"
            exit 1
          fi
          echo "Coverage ${COVERAGE} meets threshold ${MIN_COVERAGE}%"

      - name: Report coverage summary
        if: github.event_name == 'pull_request'
        run: |
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep 'lines' | grep -oE '[0-9]+\.[0-9]+%' || true)
          echo "## Test Coverage: ${COVERAGE:-Unknown}" >> $GITHUB_STEP_SUMMARY

  build-android:
    name: Build Android
    needs: quality-check
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          setup-java: 'true'

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Verify Android build success
        run: |
          if [ -f "build/app/outputs/bundle/release/app-release.aab" ]; then
            echo "Release AAB built successfully"
          else
            echo "::error::Release AAB not found"
            exit 1
          fi

  build-ios:
    name: Build iOS
    needs: quality-check
    if: github.event_name != 'pull_request'
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter

      - name: Setup iOS
        uses: ./.github/actions/setup-ios

      - name: Build iOS (release, no codesign)
        run: flutter build ios --release --no-codesign

      - name: Verify iOS build success
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            echo "iOS release build completed successfully"
          else
            echo "::error::iOS release build not found"
            exit 1
          fi

  ci-summary:
    name: CI Summary
    needs: [quality-check, build-android, build-ios]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Create CI summary
        env:
          ANDROID_RESULT: ${{ needs.build-android.result }}
          IOS_RESULT: ${{ needs.build-ios.result }}
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Completed Steps" >> $GITHUB_STEP_SUMMARY
          echo "- **Code Quality**: Tests, analysis, and formatting checks" >> $GITHUB_STEP_SUMMARY

          if [ "$ANDROID_RESULT" = "success" ]; then
            echo "- **Android Build**: AAB compilation verified" >> $GITHUB_STEP_SUMMARY
          elif [ "$ANDROID_RESULT" = "skipped" ]; then
            echo "- **Android Build**: Skipped (PR build)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Android Build**: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$IOS_RESULT" = "success" ]; then
            echo "- **iOS Build**: Release compilation verified" >> $GITHUB_STEP_SUMMARY
          elif [ "$IOS_RESULT" = "skipped" ]; then
            echo "- **iOS Build**: Skipped (PR build)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **iOS Build**: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Notes" >> $GITHUB_STEP_SUMMARY
          echo "- CI builds create a dummy .env file for testing purposes" >> $GITHUB_STEP_SUMMARY
          echo "- iOS builds are unsigned (--no-codesign)" >> $GITHUB_STEP_SUMMARY
          echo "- Platform builds are skipped on pull requests to reduce cost" >> $GITHUB_STEP_SUMMARY
