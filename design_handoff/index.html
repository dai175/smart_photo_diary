// Filled chip with a three-tone cycle so a row reads as
// curated rather than a uniform stripe.
class _DiaryTagRow extends StatelessWidget {
  final List<String> tags;
  const _DiaryTagRow({required this.tags});

  static const _tones = [_TagTone.accent, _TagTone.secondary, _TagTone.primary];

  @override
  Widget build(BuildContext context) {
    final isDark = Theme.of(context).brightness == Brightness.dark;
    return Wrap(
      spacing: 6, runSpacing: 6,
      children: List.generate(tags.length, (i) {
        final tone = _tones[i % _tones.length];
        return _TagChip(label: tags[i], tone: tone, isDark: isDark);
      }),
    );
  }
}

enum _TagTone { primary, secondary, accent }

class _TagChip extends StatelessWidget {
  final String label;
  final _TagTone tone;
  final bool isDark;
  const _TagChip({required this.label, required this.tone, required this.isDark});

  ({Color bg, Color fg}) _palette() {
    if (isDark) {
      switch (tone) {
        case _TagTone.primary:
          return (bg: AppColors.primaryLight.withValues(alpha: 0.18),
                  fg: const Color(0xFFC4D2DD));
        case _TagTone.secondary:
          return (bg: AppColors.secondaryLight.withValues(alpha: 0.18),
                  fg: const Color(0xFFD6BBA7));
        case _TagTone.accent:
          return (bg: AppColors.accentLight.withValues(alpha: 0.18),
                  fg: const Color(0xFFE4BEA3));
      }
    }
    switch (tone) {
      case _TagTone.primary:
        return (bg: const Color(0xFFE5E0DA), fg: AppColors.onPrimaryContainer);
      case _TagTone.secondary:
        return (bg: const Color(0xFFEFE6DE), fg: AppColors.onSecondaryContainer);
      case _TagTone.accent:
        return (bg: const Color(0xFFF1DCCB), fg: AppColors.accentDark);
    }
  }

  @override
  Widget build(BuildContext context) {
    final p = _palette();
    return Container(
      padding: const EdgeInsets.symmetric(horizontal: 10, vertical: 5),
      decoration: BoxDecoration(
        color: p.bg,
        borderRadius: BorderRadius.circular(8),
      ),
      child: Text(
        label,
        style: TextStyle(
          fontSize: 11.5, fontWeight: FontWeight.w600,
          letterSpacing: 0.15, color: p.fg, height: 1.0,
        ),
      ),
    );
  }
}

}`;

enum StatCardTone { neutral, tinted }
enum _Tone { neutral, primary, secondary, accent }

class _StatCard extends StatelessWidget {
  final String label, value, unit;
  final _Tone tone;
  const _StatCard({
    required this.label, required this.value,
    required this.unit, required this.tone,
  });

  ({Color bg, Color labelColor}) _palette(BuildContext context) {
    final isDark = Theme.of(context).brightness == Brightness.dark;
    final cs = Theme.of(context).colorScheme;
    switch (tone) {
      case _Tone.neutral:
        return (
          bg: isDark ? AppColors.surfaceContainerDark : cs.surface,
          labelColor: isDark ? AppColors.accentLight : AppColors.accentDark,
        );
      case _Tone.primary:
        return (
          bg: isDark
            ? AppColors.primaryLight.withValues(alpha: 0.14)
            : const Color(0xFFEEEAE3),
          labelColor: isDark
            ? const Color(0xFFC4D2DD)
            : AppColors.onPrimaryContainer,
        );
      case _Tone.secondary:
        return (
          bg: isDark
            ? AppColors.secondaryLight.withValues(alpha: 0.14)
            : const Color(0xFFF2EAE2),
          labelColor: isDark
            ? const Color(0xFFD6BBA7)
            : AppColors.onSecondaryContainer,
        );
      case _Tone.accent:
        return (
          bg: isDark
            ? AppColors.accentLight.withValues(alpha: 0.14)
            : const Color(0xFFF4E1D2),
          labelColor: isDark
            ? const Color(0xFFE4BEA3)
            : AppColors.accentDark,
        );
    }
  }

  @override
  Widget build(BuildContext context) {
    final p = _palette(context);
    final cs = Theme.of(context).colorScheme;
    return Container(
      padding: const EdgeInsets.fromLTRB(18, 18, 18, 16),
      decoration: BoxDecoration(
        color: p.bg,
        borderRadius: BorderRadius.circular(18),
        boxShadow: tone == _Tone.neutral
          ? AppSpacing.cardShadowXs : null,
      ),
      child: Column(
        crossAxisAlignment: CrossAxisAlignment.start,
        children: [
          Text(label.toUpperCase(), style: TextStyle(
            fontSize: 11, fontWeight: FontWeight.w700, letterSpacing: 0.9,
            color: p.labelColor,
          )),
          const Spacer(),
          Row(
            crossAxisAlignment: CrossAxisAlignment.baseline,
            textBaseline: TextBaseline.alphabetic,
            children: [
              Text(value, style: TextStyle(
                fontSize: 40, fontWeight: FontWeight.w700,
                height: 1.0, letterSpacing: -1.2,
                color: cs.onSurface,
                fontFeatures: const [FontFeature.tabularFigures()],
              )),
              const SizedBox(width: 6),
              Padding(
                padding: const EdgeInsets.only(bottom: 4),
                child: Text(unit, style: TextStyle(
                  fontSize: 13, fontWeight: FontWeight.w500,
                  color: cs.onSurfaceVariant,
                )),
              ),
            ],
          ),
        ],
      ),
    );
  }
}

    if (events.isEmpty) return null;
    final isDark = Theme.of(context).brightness == Brightness.dark;
    final tintBg = isDark
      ? AppColors.accentLight.withValues(alpha: 0.22)
      : AppColors.accent.withValues(alpha: 0.18);

      Positioned.fill(
        child: Container(
          margin: const EdgeInsets.all(3),
          decoration: BoxDecoration(color: tintBg, shape: BoxShape.circle),

      if (events.length > 1)

// ─── unified 3-tone category chip ─────────────────────────────────
enum _ChipTone { primary, secondary, accent }

class _CategoryChip extends StatelessWidget {
  final PromptCategory category;
  const _CategoryChip({required this.category});

  // Deterministic mapping: every category lands in one of 3 tones.
  // This replaces PromptCategoryUtils.getCategoryColor's 9-colour palette
  // for the chip rendering only — the data layer stays untouched.
  static const _toneMap = <PromptCategory, _ChipTone>{
    PromptCategory.emotion:           _ChipTone.primary,
    PromptCategory.emotionDepth:      _ChipTone.secondary,
    PromptCategory.sensoryEmotion:    _ChipTone.accent,
    PromptCategory.emotionGrowth:     _ChipTone.secondary,
    PromptCategory.emotionConnection: _ChipTone.primary,
    PromptCategory.emotionDiscovery:  _ChipTone.accent,
    PromptCategory.emotionFantasy:    _ChipTone.secondary,
    PromptCategory.emotionHealing:    _ChipTone.primary,
    PromptCategory.emotionEnergy:     _ChipTone.accent,
  };

  @override
  Widget build(BuildContext context) {
    final isDark = Theme.of(context).brightness == Brightness.dark;
    final tone = _toneMap[category] ?? _ChipTone.primary;
    final ({Color bg, Color fg}) p = switch (tone) {
      _ChipTone.primary => isDark
        ? (bg: AppColors.primaryLight.withValues(alpha: 0.18),
           fg: const Color(0xFFC4D2DD))
        : (bg: const Color(0xFFE5E0DA), fg: AppColors.onPrimaryContainer),
      _ChipTone.secondary => isDark
        ? (bg: AppColors.secondaryLight.withValues(alpha: 0.18),
           fg: const Color(0xFFD6BBA7))
        : (bg: const Color(0xFFEFE6DE), fg: AppColors.onSecondaryContainer),
      _ChipTone.accent => isDark
        ? (bg: AppColors.accentLight.withValues(alpha: 0.18),
           fg: const Color(0xFFE4BEA3))
        : (bg: const Color(0xFFF1DCCB), fg: AppColors.accentDark),
    };
    return Container(
      padding: const EdgeInsets.symmetric(horizontal: 10, vertical: 5),
      decoration: BoxDecoration(
        color: p.bg, borderRadius: BorderRadius.circular(8),
      ),
      child: Text(
        PromptCategoryUtils.getCategoryDisplayName(
          category, locale: Localizations.localeOf(context)),
        style: TextStyle(
          fontSize: 11.5, fontWeight: FontWeight.w600,
          letterSpacing: 0.15, color: p.fg, height: 1.0,
        ),
      ),
    );
  }
}

// Drop-in replacement for the inner tile used by TimelinePhotoWidget.
class HomePhotoTile extends StatelessWidget {
  final AssetEntity asset;
  final bool isSelected;
  final bool isUsed;
  final bool isLocked;
  final VoidCallback? onTap;

  const HomePhotoTile({
    super.key,
    required this.asset,
    this.isSelected = false,
    this.isUsed = false,
    this.isLocked = false,
    this.onTap,
  });

  @override
  Widget build(BuildContext context) {
    final isDark = Theme.of(context).brightness == Brightness.dark;
    final accent = isDark ? AppColors.accentLight : AppColors.accent;
    return GestureDetector(
      onTap: onTap,
      child: ClipRRect(
        borderRadius: BorderRadius.circular(12),
        child: Stack(fit: StackFit.expand, children: [
          // photo
          Opacity(
            opacity: isUsed ? 0.45 : (isLocked ? 0.55 : 1.0),
            child: ColorFiltered(
              colorFilter: isLocked
                ? const ColorFilter.matrix(<double>[
                    0.4, 0.4, 0.4, 0, 0,
                    0.4, 0.4, 0.4, 0, 0,
                    0.4, 0.4, 0.4, 0, 0,
                    0,   0,   0,   1, 0,
                  ])
                : const ColorFilter.mode(Colors.transparent, BlendMode.dst),
              child: AssetEntityImage(asset, fit: BoxFit.cover, isOriginal: false),
            ),
          ),
          // selection ring + overlay
          if (isSelected && !isUsed && !isLocked)
            Positioned.fill(child: IgnorePointer(
              child: Container(decoration: BoxDecoration(
                color: accent.withValues(alpha: 0.13),
                borderRadius: BorderRadius.circular(12),
                border: Border.all(color: accent, width: 2.5),
              )),
            )),
          // unselected hint ring
          if (!isSelected && !isUsed && !isLocked)
            const Positioned(top: 8, right: 8, child: _HollowRing()),
          // selected check disc
          if (isSelected && !isUsed && !isLocked)
            Positioned(top: 8, right: 8, child: _CheckDisc(accent: accent)),
          // used chip
          if (isUsed)
            const Positioned(top: 8, left: 8, child: _DiaryChip()),
          // premium-locked badge (centered)
          if (isLocked) const Center(child: _LockedBadge()),
        ]),
      ),
    );
  }
}

// Drop-in replacement for the existing SettingsRow widget.
// Smaller, soft-tinted accent icon tile + heavier title.
class SettingsRow extends StatelessWidget {
  final IconData icon;
  final String title;
  final String subtitle;
  final VoidCallback? onTap;
  final Widget? trailing;
  final bool danger;
  final String? semanticLabel;

  const SettingsRow({
    super.key,
    required this.icon,
    required this.title,
    required this.subtitle,
    this.onTap,
    this.trailing,
    this.danger = false,
    this.semanticLabel,
  });

  @override
  Widget build(BuildContext context) {
    final isDark = Theme.of(context).brightness == Brightness.dark;
    final cs = Theme.of(context).colorScheme;
    final accent = isDark ? AppColors.accentLight : AppColors.accentDark;
    final glyphBg = isDark
      ? const Color(0xFF3A3633) : const Color(0xFFF0EDE8);
    final iconBg = danger
      ? AppColors.errorContainer
      : glyphBg;
    final iconFg = danger ? AppColors.error : accent;

    final row = Padding(
      padding: const EdgeInsets.fromLTRB(16, 14, 16, 14),
      child: Row(children: [
        Container(
          width: 36, height: 36,
          decoration: BoxDecoration(
            color: iconBg, borderRadius: BorderRadius.circular(10),
          ),
          child: Icon(icon, size: 18, color: iconFg),
        ),
        const SizedBox(width: 14),
        Expanded(
          child: Column(
            crossAxisAlignment: CrossAxisAlignment.start,
            children: [
              Text(title, style: TextStyle(
                fontSize: 15, fontWeight: FontWeight.w600,
                letterSpacing: -0.1, height: 1.3,
                color: danger ? AppColors.error : cs.onSurface,
              )),
              const SizedBox(height: 2),
              Text(subtitle, style: TextStyle(
                fontSize: 12.5, height: 1.4,
                color: cs.onSurfaceVariant,
              ), maxLines: 1, overflow: TextOverflow.ellipsis),
            ],
          ),
        ),
        if (trailing != null) ...[trailing!, const SizedBox(width: 8)],
        if (onTap != null)
          Icon(Icons.chevron_right_rounded,
            size: 18, color: cs.onSurfaceVariant),
      ]),
    );

    Widget result = onTap != null
      ? InkWell(onTap: onTap, child: row)
      : row;
    if (semanticLabel != null) {
      result = Semantics(
        label: semanticLabel, button: onTap != null, child: result,
      );
    }
    return result;
  }
}

    final accent = isDark ? AppColors.accentLight : AppColors.accent;
    final used = info.monthlyUsageCount;
    final limit = info.monthlyAiGenerationLimit;
    final remaining = (limit - used).clamp(0, limit);
    final ratio = limit == 0 ? 0.0 : used / limit;
    final warn = ratio > 0.85;

    final bg = info.isPremium
      ? (isDark
          ? AppColors.accentLight.withValues(alpha: 0.14)
          : const Color(0xFFF4E1D2))
      : (isDark ? AppColors.surfaceContainerDark : Colors.white);

    return Material(
      color: bg, borderRadius: BorderRadius.circular(20), clipBehavior: Clip.antiAlias,
      child: InkWell(
        onTap: onTap,
        child: Padding(
          padding: const EdgeInsets.fromLTRB(18, 18, 18, 16),
          child: Column(crossAxisAlignment: CrossAxisAlignment.start, children: [
            // plan badge row
            Row(children: [
              _PlanBadge(isPremium: info.isPremium),
              const Spacer(),
              if (onTap != null)
                Icon(Icons.chevron_right_rounded,
                  size: 18, color: cs.onSurfaceVariant),
            ]),
            const SizedBox(height: 14),

            // eyebrow + display numerals
            Text(
              context.l10n.settingsPlanThisMonth.toUpperCase(),
              style: TextStyle(
                fontSize: 11, fontWeight: FontWeight.w700, letterSpacing: 0.9,
                color: isDark ? AppColors.accentLight : AppColors.accentDark,
              ),
            ),
            const SizedBox(height: 4),
            Row(crossAxisAlignment: CrossAxisAlignment.baseline,
              textBaseline: TextBaseline.alphabetic, children: [
              Text('\$used', style: TextStyle(
                fontSize: 36, fontWeight: FontWeight.w700,
                height: 1.0, letterSpacing: -1.0,
                color: cs.onSurface,
                fontFeatures: const [FontFeature.tabularFigures()],
              )),
              const SizedBox(width: 8),
              Padding(
                padding: const EdgeInsets.only(bottom: 4),
                child: Text('/ \$limit \${context.l10n.settingsPlanDiariesUnit}',
                  style: TextStyle(
                    fontSize: 16, fontWeight: FontWeight.w500,
                    color: cs.onSurfaceVariant,
                    fontFeatures: const [FontFeature.tabularFigures()],
                  )),
              ),
              const Spacer(),
              Padding(
                padding: const EdgeInsets.only(bottom: 4),
                child: Text(
                  context.l10n.settingsPlanRemainingAndReset(remaining),
                  style: TextStyle(fontSize: 12, fontWeight: FontWeight.w600,
                    color: cs.onSurfaceVariant),
                ),
              ),
            ]),
            const SizedBox(height: 10),

            // progress track
            ClipRRect(
              borderRadius: BorderRadius.circular(999),
              child: LinearProgressIndicator(
                value: ratio.toDouble().clamp(0.0, 1.0),
                minHeight: 6,
                backgroundColor: cs.outlineVariant,
                valueColor: AlwaysStoppedAnimation<Color>(
                  warn ? AppColors.error : accent,
                ),
              ),
            ),

            if (!info.isPremium) ...[
              const SizedBox(height: 14),
              SizedBox(
                width: double.infinity,
                child: FilledButton.icon(
                  onPressed: onUpgrade,
                  icon: const Icon(Icons.star_rounded, size: 14),
                  label: Text(context.l10n.settingsUpgradeToPremium),
                  style: FilledButton.styleFrom(
                    backgroundColor: accent, foregroundColor: Colors.white,

  }

                     '\${context.l10n.formatMonthDay(filter.dateRange!.end)}',
              tone: _ChipTone.primary,
              onRemove: onRemoveDateRange,
            ),
          for (final tag in filter.selectedTags)
            _RemovableChip(label: '#\$tag', tone: _ChipTone.accent,
              onRemove: () => onRemoveTag?.call(tag)),
          for (final period in filter.timeOfDay)
            _RemovableChip(
              label: _timeLabel(context, period),
              tone: _ChipTone.secondary,
              onRemove: () => onRemoveTimeOfDay?.call(period),
            ),
          if (filter.searchText != null && filter.searchText!.isNotEmpty)
            _RemovableChip(
              label: context.l10n.filterActiveSearch(filter.searchText!),
              tone: _ChipTone.primary,
              onRemove: onRemoveSearch,
            ),
        ]),
      ]),
    );
  }
}

enum _ChipTone { primary, secondary, accent }

class _RemovableChip extends StatelessWidget {
  final String label;
  final _ChipTone tone;
  final VoidCallback? onRemove;
  const _RemovableChip({
    required this.label, required this.tone, this.onRemove,
  });

  @override
  Widget build(BuildContext context) {
    final isDark = Theme.of(context).brightness == Brightness.dark;
    final ({Color bg, Color fg}) p = switch (tone) {
      _ChipTone.primary => isDark
        ? (bg: AppColors.primaryLight.withValues(alpha: 0.18),
           fg: const Color(0xFFC4D2DD))
        : (bg: const Color(0xFFE5E0DA), fg: AppColors.onPrimaryContainer),
      _ChipTone.secondary => isDark
        ? (bg: AppColors.secondaryLight.withValues(alpha: 0.18),
           fg: const Color(0xFFD6BBA7))
        : (bg: const Color(0xFFEFE6DE), fg: AppColors.onSecondaryContainer),
      _ChipTone.accent => isDark
        ? (bg: AppColors.accentLight.withValues(alpha: 0.18),
           fg: const Color(0xFFE4BEA3))
        : (bg: const Color(0xFFF1DCCB), fg: AppColors.accentDark),
    };
    return Container(
      padding: const EdgeInsets.fromLTRB(10, 5, 6, 5),
      decoration: BoxDecoration(
        color: p.bg, borderRadius: BorderRadius.circular(999),
      ),
      child: Row(mainAxisSize: MainAxisSize.min, children: [
        Text(label, style: TextStyle(
          fontSize: 11.5, fontWeight: FontWeight.w600,
          color: p.fg, height: 1.0,
        )),
        const SizedBox(width: 6),
        InkWell(
          onTap: onRemove,
          customBorder: const CircleBorder(),
          child: Container(
            width: 16, height: 16,
            decoration: BoxDecoration(
              color: Colors.black.withValues(alpha: 0.10),
              shape: BoxShape.circle,
            ),
            child: Icon(Icons.close_rounded, size: 11, color: p.fg),
          ),
        ),
      ]),
    );
  }
}`;
